apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-product
  namespace: project2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-product
  template:
    metadata:
      labels:
        app: service-product
    spec:
      containers:
        - name: service-product
          image: ghcr.io/paul486461/project2-service-product:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: SPRING_CONFIG_IMPORT
              value: optional:configserver:http://config-server:8889
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

